events:
  usdc_svb_2023:
    name: "USDC/SVB depeg"
    mechanism: "fiat_reserve_bank_shock"
    description: >
      USDC de-pegged after SVB's FDIC receivership was announced on 2023-03-10.
      Peak discount reached ~5% on Coinbase. Recovery mostly complete by 2023-03-15.
    core_window_utc: ["2023-03-10", "2023-03-15"]
    analysis_window_utc: ["2023-03-08", "2023-03-20"]
    shock_onset_utc: "2023-03-10T06:00:00Z"   # FDIC announcement
    primary: true
    data_quality: "high"   # best L2 coverage in existing stressbench repo
    notes: >
      Use as MVP event. CEX and Curve pool data already partly available from
      stressbench pipeline. Check USDC/USD on Coinbase for Tier-A depth.

  terra_luna_2022:
    name: "Terra/LUNA collapse"
    mechanism: "algorithmic_reflexive"
    description: >
      UST lost its peg starting ~2022-05-08. LUNA hyperinflation and LFG reserve
      drawdown followed. Cascading liquidations on CEXs and Curve pools.
    core_window_utc: ["2022-05-09", "2022-05-16"]
    analysis_window_utc: ["2022-05-01", "2022-05-31"]
    shock_onset_utc: "2022-05-08T00:00:00Z"
    primary: false
    data_quality: "medium"  # UST CEX archives may be incomplete
    notes: >
      UST CEX L2 history may be thin; use trade-level or OHLCV for price context.
      Curve UST/3CRV pool state from on-chain logs is Tier-A.

  usdt_curve_2023:
    name: "USDT/Curve stress"
    mechanism: "defi_pool_imbalance"
    description: >
      Mid-June 2023. USDT-heavy imbalance in Curve stablecoin pools, particularly
      3pool and crvUSD-related pools. Temporary basis widening on CEXs.
    core_window_utc: ["2023-06-15", "2023-06-18"]
    analysis_window_utc: ["2023-06-10", "2023-06-25"]
    shock_onset_utc: "2023-06-15T00:00:00Z"
    primary: false
    data_quality: "medium"
    notes: >
      DEX pool imbalance is the dominant mechanism; on-chain events are Tier-A.
      CEX USDT/USD depth may need Tardis or Kaiko for Tier-A.

  celsius_3ac_2022:
    name: "Celsius/3AC credit shock"
    mechanism: "exchange_credit_liquidity"
    description: >
      Celsius Network halted withdrawals on 2022-06-12 amid liquidity pressure,
      coinciding with 3AC insolvency fears. Rapid CEX stablecoin flight and
      BTC sell-offs created significant USDC/USDT basis stress.
    core_window_utc: ["2022-06-12", "2022-06-18"]
    analysis_window_utc: ["2022-06-12", "2022-06-20"]
    shock_onset_utc: "2022-06-12T00:00:00Z"
    primary: false
    data_quality: "medium"
    notes: >
      Training event for CEX arb meta-labeling (exchange-credit mechanism class).
      BTCUSDC spot was not listed on Binance until Oct 2022; use kline proxy.
      USDCUSDT and BTCUSDT are both available in Binance Vision daily archives.

  ftx_2022:
    name: "FTX collapse"
    mechanism: "exchange_credit_liquidity"
    description: >
      FTX solvency crisis began ~2022-11-06 with CZ's tweet. Bankruptcy filed
      2022-11-11. Massive exchange outflows and cross-stablecoin stress.
    core_window_utc: ["2022-11-06", "2022-11-14"]
    analysis_window_utc: ["2022-11-01", "2022-11-30"]
    shock_onset_utc: "2022-11-06T00:00:00Z"
    primary: false
    data_quality: "low"   # FTX L2 data unavailable post-collapse
    notes: >
      FTX-native L2 is unavailable. Focus on Binance/Coinbase/Kraken as transmission
      destinations. Exchange outflows from Coin Metrics / Dune are Tier-B.

  busd_2023:
    name: "BUSD wind-down"
    mechanism: "regulatory_issuer_winddown"
    description: >
      Paxos received NYDFS instruction to stop minting BUSD on 2023-02-13.
      BUSD supply declined as users redeemed or converted to other stablecoins.
    core_window_utc: ["2023-02-13", "2023-02-21"]
    analysis_window_utc: ["2023-02-06", "2023-03-13"]
    shock_onset_utc: "2023-02-13T00:00:00Z"
    primary: false
    data_quality: "medium"
    notes: >
      Gradual wind-down rather than acute shock. Redemption flows on-chain are
      Tier-A. BUSD/USDT pairs on Binance are well-archived.
