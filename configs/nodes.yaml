nodes:
  # ---------------------------------------------------------------------------
  # Market nodes — stablecoin-venue pairs
  # ---------------------------------------------------------------------------
  market_nodes:
    - id: usdc_coinbase
      asset: USDC
      venue: Coinbase
      layer: CEX
      symbols: ["USDT-USD", "USDC-USD", "USDC-USDT"]
      provenance_best: "real_l2"
      tier: A
      events_covered: [usdc_svb_2023]
      notes: >
        Primary USDC/Coinbase node. Coinbase Exchange does not offer a USDC-USD
        spot pair (USDC redeems at par); USDT-USD candles used as a stress proxy
        (USDT premium on Coinbase is inversely correlated with USDC stress).

    - id: usdc_binance
      asset: USDC
      venue: Binance
      layer: CEX
      symbols: ["USDCUSDT", "BTCUSDC"]
      provenance_best: "real_l2"
      tier: A
      events_covered: [usdc_svb_2023, busd_2023]
      notes: "Binance Vision diff-depth available for USDCUSDT."

    - id: usdt_binance
      asset: USDT
      venue: Binance
      layer: CEX
      symbols: ["USDCUSDT", "BTCUSDT", "ETHUSDT"]
      provenance_best: "real_l2"
      tier: A
      events_covered: [usdc_svb_2023, usdt_curve_2023, ftx_2022, busd_2023, terra_luna_2022]
      notes: "Binance is the dominant USDT venue. Most events covered."

    - id: usdt_kraken
      asset: USDT
      venue: Kraken
      layer: CEX
      symbols: ["USDTUSD", "USDCUSD"]
      provenance_best: "real_l2"
      tier: A
      events_covered: [usdc_svb_2023, usdt_curve_2023]
      notes: >
        Kraken USDT/USD. Kraken public REST OHLC API (no auth required).
        Note: free tier does not retain historical data older than ~90 days;
        for events before that window, falls back to fixture.

    - id: usdc_kraken
      asset: USDC
      venue: Kraken
      layer: CEX
      symbols: ["USDCUSD", "USDTUSD"]
      provenance_best: "real_l2"
      tier: A
      events_covered: [usdc_svb_2023]
      notes: >
        Kraken USDC/USD. Secondary CEX check on USDC/SVB propagation.
        Pair code: USDCUSD (Kraken normalizes to USDCUSD internally).

    - id: busd_binance
      asset: BUSD
      venue: Binance
      layer: CEX
      symbols: ["BUSDUSDT", "BUSDUSDC"]
      provenance_best: "real_l2"
      tier: A
      events_covered: [busd_2023, ftx_2022]
      notes: "Binance was the primary BUSD venue."

    - id: ust_binance
      asset: UST
      venue: Binance
      layer: CEX
      symbols: ["USTUSDT", "USTBUSD"]
      provenance_best: "trade_level"
      tier: B
      events_covered: [terra_luna_2022]
      notes: "Delisted. Trade-level archive may be available via Tardis/Kaiko."

  # ---------------------------------------------------------------------------
  # Pool nodes — DEX liquidity pools
  # ---------------------------------------------------------------------------
  pool_nodes:
    - id: curve_3pool
      venue: Curve
      layer: DEX
      chain: Ethereum
      assets: ["DAI", "USDC", "USDT"]
      contract: "0xbEbc44782C7dB0a1A60Cb6fe97d0b483032FF1C7"
      subgraph: "messari/curve-finance-ethereum"
      provenance_best: "dex_pool_onchain"
      tier: A
      events_covered: [usdc_svb_2023, usdt_curve_2023, terra_luna_2022, ftx_2022, busd_2023]
      notes: "Primary DEX node. Reserve imbalance and virtual_price from on-chain logs."

    - id: curve_ust_wormhole
      venue: Curve
      layer: DEX
      chain: Ethereum
      assets: ["UST", "3CRV"]
      contract: "0xCEAF7747579696A2F0bb206a14210e3c9e6fB269"
      provenance_best: "dex_pool_onchain"
      tier: A
      events_covered: [terra_luna_2022]
      notes: "Key pool for Terra collapse propagation. Extreme imbalance in May 2022."

    - id: uniswap_usdc_usdt_005
      venue: Uniswap
      layer: DEX
      chain: Ethereum
      assets: ["USDC", "USDT"]
      fee_tier: 500
      factory: "0x1F98431c8aD98523631AE4a59f267346ea31F984"
      pool_address: "0x3416cF6C708Da44DB2624D63ea0AAef7113527C6"
      provenance_best: "dex_pool_onchain"
      tier: A
      events_covered: [usdc_svb_2023, usdt_curve_2023]
      notes: "Low-fee stable pool. sqrtPriceX96 and tick from Swap events via The Graph."

    - id: curve_crvusd_usdt
      venue: Curve
      layer: DEX
      chain: Ethereum
      assets: ["crvUSD", "USDT"]
      contract: "0x390f3595bCa2Df7d23783dFd126427CCeb997BF4"
      provenance_best: "dex_pool_onchain"
      tier: A
      events_covered: [usdt_curve_2023]
      notes: >
        crvUSD/USDT StableSwap-ng pool. Contract 0x390f…BF4 deployed May 2023.
        Relevant for June 2023 USDT stress in crvUSD pools.

  # ---------------------------------------------------------------------------
  # Flow nodes — settlement, bridge, and on-chain flow channels
  # ---------------------------------------------------------------------------
  flow_nodes:
    - id: eth_usdc_exchange_flows
      layer: onchain_flow
      chain: Ethereum
      asset: USDC
      token_contract: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
      sources: ["coin_metrics", "dune", "etherscan"]
      provenance_best: "aggregate_onchain_flow"
      tier: B
      events_covered: [usdc_svb_2023, ftx_2022]
      notes: "Exchange-labelled netflows from Coin Metrics. Tier-B: label completeness uncertain."

    - id: eth_usdt_exchange_flows
      layer: onchain_flow
      chain: Ethereum
      asset: USDT
      token_contract: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
      sources: ["coin_metrics", "dune", "etherscan"]
      provenance_best: "aggregate_onchain_flow"
      tier: B
      events_covered: [usdt_curve_2023, ftx_2022, usdc_svb_2023]
      notes: "USDT exchange inflow/outflow. Companion to usdc flows."

    - id: tron_usdt_exchange_flows
      layer: onchain_flow
      chain: Tron
      asset: USDT
      token_contract: "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"
      sources: ["coin_metrics", "dune"]
      provenance_best: "aggregate_onchain_flow"
      tier: B
      events_covered: [usdt_curve_2023]
      notes: "Tron USDT flows relevant for June 2023 stress. Dune/Coin Metrics."

    - id: eth_bridge_flows
      layer: bridge_flow
      chain: multi
      asset: multi
      sources: ["dune", "etherscan"]
      provenance_best: "aggregate_onchain_flow"
      tier: B
      events_covered: [ftx_2022, usdc_svb_2023]
      notes: >
        Bridge inflows/outflows across major Ethereum L1/L2 bridges.
        Label confidence varies by bridge contract coverage.

    - id: usdc_mint_burn
      layer: mint_burn
      chain: Ethereum
      asset: USDC
      issuer: "Circle"
      token_contract: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
      sources: ["etherscan", "the_graph"]
      provenance_best: "onchain_event"
      tier: A
      events_covered: [usdc_svb_2023]
      notes: "Mint/burn from Transfer events to/from null address. Tier-A: directly observable."

    - id: usdt_mint_burn
      layer: mint_burn
      chain: Ethereum
      asset: USDT
      issuer: "Tether"
      token_contract: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
      # Tether emits Issue(uint256) and Redeem(uint256) rather than standard
      # ERC-20 Transfer events.  The issue_redeem encoding dispatches to
      # ingest_tether_issue_redeem() in etherscan.py (uses eth_getLogs).
      event_encoding: "issue_redeem"
      sources: ["etherscan"]
      provenance_best: "onchain_event"
      tier: A
      events_covered: [usdt_curve_2023]
      notes: >
        Mint/burn from Issue(uint256)/Redeem(uint256) events on the Tether
        mainnet ERC-20 contract.  Decoded via eth_getLogs with topic hashes
        from TETHER_MINT_CONFIGS in etherscan.py.  Tier A: directly observable
        on-chain events with no off-chain intermediary.
