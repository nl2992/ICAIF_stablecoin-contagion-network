name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build event windows
        run: make windows

      - name: Run fixture MVP smoke test
        run: make mvp EVENT=usdc_svb_2023 INGEST_FLAGS=--fixture-only

  # Empirical coverage check — validates the primary case study produces a
  # non-fixture Tier-A panel when the Etherscan API key is available.
  # Safe to skip on forks (secret not available).
  empirical-coverage:
    runs-on: ubuntu-latest
    if: ${{ secrets.ETHERSCAN_API_KEY != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run empirical pipeline for primary event
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: make empirical EVENT=usdt_curve_2023

      - name: Check empirical coverage (no fixture rows allowed in strict mode)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python scripts/00d_check_empirical_coverage.py --event usdt_curve_2023 --strict

      - name: Validate paper package
        run: python scripts/14_validate_paper_package.py
