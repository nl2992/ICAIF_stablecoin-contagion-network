name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build event windows
        run: make windows

      - name: Run fixture MVP smoke test
        run: make mvp EVENT=usdc_svb_2023 INGEST_FLAGS=--fixture-only
